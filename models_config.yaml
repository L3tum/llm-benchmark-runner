# Model configurations for the benchmark suite.
# Each model is started directly, benchmarked against its local proxy, then stopped.

models:
  - display_name: "MyModel Q4"
    model: "model"  # model name to send to the proxy API (llama-server uses "model")
    cmd: "llama-server -m /path/to/model.Q4.gguf --port 28287"
    proxy: "http://localhost:28287/v1"

  - display_name: "MyModel Q5"
    model: "model"
    cmd: "llama-server -m /path/to/model.Q5.gguf --port 28288"
    proxy: "http://localhost:28288/v1"

benchmarks:
  - mmlu_pro
  - kld
  # - minebench
  # Function-completion coding benchmarks:
  # - humaneval_plus
  # - humaneval
  # - mbpp_plus
  # Repository patch benchmarks:
  # - swebench_verified
  # - swebench_pro

# Shared runtime settings for benchmarks that execute generated code/tests in Docker.
# build_images auto-builds missing local benchmark images, including the SWE-Bench harness.
docker:
  enabled: true
  default_timeout_secs: 8
  images:
    python: python:3.12
    swebench_harness: llm-benchmark-runner/swebench-harness:latest
  build_images: true
  max_workers: 1
  mount_docker_socket: true
  docker_socket_path: /var/run/docker.sock
  # Required when this runner itself runs in Docker with the host Docker socket mounted:
  # host_repo_path: /host/path/to/llm-benchmark-runner

benchmark:
  mmlu_pro:
    num_samples: 100
    # subjects: null  # filter by subjects (comma-separated), null = all
  kld:
    num_prompts: 50
    prompt_source: mmlu
    # custom_prompts_path: null
  minebench:
    # Optional: run several Minebench building prompts
    buildings: [castle, dragon, train]
    # Optional legacy/custom single prompt:
    # build: "A compact test castle"
  humaneval_plus:
    # Requires Docker. Oracle-separated EvalPlus-style evaluation.
    num_samples: 10
    timeout_secs: 8
    enable_pass2: false
    enable_pass3: false
  humaneval:
    # Original HumanEval uses public tests embedded in the dataset.
    num_samples: 10
  mbpp_plus:
    num_samples: 10
  swebench_verified:
    # Requires Docker and a SWE-Bench harness image.
    num_samples: 1
    split: test
    timeout_secs: 1800
  swebench_pro:
    num_samples: 1
    split: test
    timeout_secs: 1800
    token_env: HF_TOKEN
    # dataset_id: SWE-bench/SWE-bench_Pro
  coding_eval:
    # Backwards-compatible umbrella config shape; prefer the explicit benchmark names above.
    tasksets:
      humaneval_plus: ~
    num_samples: 10

# Comparison groups for generating filtered reports.
# Each comparison produces a standalone benchmark_report.html file containing only the listed models.
# File names are slugified from the title (e.g., "Q4 vs Q5" → "q4-vs-q5.html").
comparisons:
  - title: "Q4 vs Q5"
    models:
      - "MyModel Q4"
      - "MyModel Q5"

# Extensible: add custom benchmark sections here
custom_bench:
  key: "value"