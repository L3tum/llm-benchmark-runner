# Model configurations for the benchmark suite.
# Each model is started directly, benchmarked against its local proxy, then stopped.

models:
  - display_name: "MyModel Q4"
    model: "model"  # model name to send to the proxy API (llama-server uses "model")
    cmd: "llama-server -m /path/to/model.Q4.gguf --port 28287"
    proxy: "http://localhost:28287/v1"

  - display_name: "MyModel Q5"
    model: "model"
    cmd: "llama-server -m /path/to/model.Q5.gguf --port 28288"
    proxy: "http://localhost:28288/v1"

benchmarks:
  - mmlu_pro
  - kld
  # - minebench

benchmark:
  mmlu_pro:
    num_samples: 100
    # subjects: null  # filter by subjects (comma-separated), null = all
  kld:
    num_prompts: 50
    prompt_source: mmlu
    # custom_prompts_path: null
  minebench:
    # Optional: run several Minebench building prompts
    buildings: [castle, dragon, train]
    # Optional legacy/custom single prompt:
    # build: "A compact test castle"

# Extensible: add custom benchmark sections here
custom_bench:
  key: "value"