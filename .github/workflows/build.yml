name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup default stable

      - name: Check formatting
        run: |
          source "$HOME/.cargo/env"
          cargo fmt -- --check

      - name: Clippy (pedantic)
        run: |
          source "$HOME/.cargo/env"
          cargo clippy --all-targets --all-features -- -D warnings

  build-and-test:
    name: Build and Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup default stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Build
        run: |
          source "$HOME/.cargo/env"
          cargo build --release

      - name: Run Tests
        run: |
          source "$HOME/.cargo/env"
          cargo test

  miri:
    name: MIRI (Undefined Behavior Detection)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup default stable

      - name: Install MIRI (nightly)
        run: |
          source "$HOME/.cargo/env"
          rustup install nightly
          rustup component add miri --toolchain nightly
          cargo +nightly miri setup

      - name: Run MIRI tests
        run: |
          source "$HOME/.cargo/env"
          cargo +nightly miri test

  deny:
    name: cargo-deny (licenses, security, ban)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup default stable

      - name: Install cargo-deny
        run: |
          source "$HOME/.cargo/env"
          cargo install --locked cargo-deny

      - name: Check licenses, security advisories, banned crates
        run: |
          source "$HOME/.cargo/env"
          cargo deny check licenses advisories ban
