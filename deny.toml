[licenses]
# Allowed licenses — permissive and copyleft
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
# Warn about duplicate crates (multiple versions)
multiple-versions = "warn"

[advisories]
# Block crates with unresolved security advisories
ignore = [
    "RUSTSEC-2025-0119",  # number_prefix unmaintained (used by indicatif)
]
