models:
  - display_name: "TestModel"
    model: "model"
    cmd: "sleep 1"  # will not work as a real proxy, but tests the flow
    proxy: "http://localhost:12345/v1"

benchmarks:
  - mmlu_pro
  - kld
  - gpqa
  - aime
  - math500
  - minebench
  # - humaneval_plus
  # - swebench_verified

docker:
  enabled: true
  default_timeout_secs: 8
  images:
    python: python:3.12
    swebench_harness: llm-benchmark-runner/swebench-harness:latest
  build_images: true
  max_workers: 1
  mount_docker_socket: true
  docker_socket_path: /var/run/docker.sock
  # host_repo_path: /host/path/to/llm-benchmark-runner

benchmark:
  mmlu_pro:
    num_samples: 1
    subjects: "astronomy"
  kld:
    num_prompts: 1
    prompt_source: mmlu
  gpqa:
    num_samples: 1
    subjects: "physics"
    # Requires HF_TOKEN env var for gated dataset download
  aime:
    num_samples: 1
    # year: "2025"  # use "2025" or "2026" to select the AIME dataset (default 2025)
  math500:
    num_samples: 1
    subjects: "algebra"
  minebench:
    buildings: [castle, dragon, train]
    # Optional legacy/custom single prompt:
    # build: "A compact test castle"
  supergpqa:
    num_samples: 1
    subjects: "Mathematics"  # Test a single discipline (Mathematics has many questions)
  humaneval_plus:
    num_samples: 1
    timeout_secs: 8
    enable_pass2: false
    enable_pass3: false
  swebench_verified:
    num_samples: 1
    split: test
    timeout_secs: 1800
  coding_eval:
    # Backwards-compatible umbrella config shape.
    tasksets:
      humaneval_plus: ~
    num_samples: 1
